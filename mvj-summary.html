<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{font-family:sans-serif;padding:10px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#f2f2f2;}

</style>
</head>

<body>

<h3>成績一覧</h3>

<table id="resultTable">
<thead>
<tr>
<th>名前</th>
<th>稽古日数</th>
<th>メダル</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const FLOW_URL = "https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/ffa50cff0e824a01815e70c8725d3ea8/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=oMvFcwLLgRwkdXfFnUZpPrYtU06wBGT7VBBE1GTMgGk";

async function loadData(){

const res = await fetch(FLOW_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({})
});

const result = await res.json();

/* ★ PowerAutomate対策 ★ */
const data = result.value || result.body || result;

/* ---------------------- */

let players = {};

data.forEach(item=>{

const name = item.Name;
const medal = item.Medal;

/* ★ Date型修正 ★ */
const date = new Date(item.Date)
.toISOString()
.split("T")[0];
/* ---------------- */

if(!name) return;

if(!players[name]){
players[name]={
dates:new Set(),
medals:0
};
}

/* Unique日付 */
players[name].dates.add(date);

/* Medalカウント */
if(medal && medal.includes("🏅")){
players[name].medals++;
}


});

/* 表示用配列 */
let final = Object.keys(players).map(name=>({
name:name,
days:players[name].dates.size,
medals:players[name].medals
}));

/* Medal多い順 */
final.sort((a,b)=>b.medals-a.medals);

/* 表示 */
const tbody = document.querySelector("#resultTable tbody");
tbody.innerHTML="";

final.forEach(p=>{
tbody.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.days}</td>
<td>${p.medals}</td>
</tr>`;
});

}

loadData();

</script>

</body>
</html>
