<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:sans-serif;padding:10px;}
    table{width:100%;border-collapse:collapse;}
    th,td{border:1px solid #ccc;padding:8px;text-align:center;}
    th{background:#f2f2f2;}
    .muted{color:#666;font-size:12px;}
    .error{color:#b00020;white-space:pre-wrap;margin-top:10px;}

    .progress-wrap{
      width:100%;
      height:20px;
      background:#eee;
      border-radius:10px;
      overflow:hidden;
      margin-top:6px;
    }
    .progress{
      height:100%;
      width:0%;
      background:#dc3545;
      transition:width 0.5s;
    }
    .progress.achieved{
      background:#28a745;
    }
  </style>
</head>
<body>

  <h3>今月の稽古回数（終了済み含む）：<span id="currentCount">0</span>回</h3>

  <h3>MVJに必要な稽古回数：<span id="thresholdCount">0</span>回</h3>

  <div class="progress-wrap">
    <div id="progressBar" class="progress"></div>
  </div>
  <div id="progressText" class="muted"></div>

  <div class="muted" id="debug"></div>
  <div class="error" id="error" style="display:none"></div>

  <table id="resultTable">
    <thead>
      <tr>
        <th>名前</th>
        <th>稽古日数</th>
        <th>メダル</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

<script>
const FLOW_URL = "https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/ffa50cff0e824a01815e70c8725d3ea8/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=oMvFcwLLgRwkdXfFnUZpPrYtU06wBGT7VBBE1GTMgGk";

/* ✅ 修正版 toDateKey（ここだけ変更） */
function toDateKey(raw){
  if(!raw) return null;

  const num = Number(raw);

  // ✅ Excelシリアル完全対応（文字列・小数・空白OK）
  if(!Number.isNaN(num)){
    const excelEpoch = new Date(1899,11,30);
    const d = new Date(excelEpoch.getTime() + num * 86400000);

    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,"0");
    const dd = String(d.getDate()).padStart(2,"0");

    return `${yyyy}/${mm}/${dd}`;
  }

  // ✅ それ以外は通常日付
  const d = new Date(raw);
  if(isNaN(d.getTime())) return null;

  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${yyyy}/${mm}/${dd}`;
}

function getMonthKey(){
  const d = new Date();
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/01`;
}

async function safeJson(res){
  const text = await res.text();
  if(!text) return {};
  try{
    return JSON.parse(text);
  }catch(e){
    return {};
  }
}

function setProgress(completed, threshold){
  const bar = document.getElementById("progressBar");
  const text = document.getElementById("progressText");

  if(!threshold || Number(threshold) <= 0){
    bar.style.width = "0%";
    bar.classList.remove("achieved");
    text.textContent = "達成率：—";
    return;
  }

  const percent = Math.min(100, Math.round((completed/threshold)*100));
  const remaining = Math.max(0, threshold - completed);

  bar.style.width = percent + "%";

  if(completed >= threshold){
    bar.classList.add("achieved");
    text.textContent = `達成率：${percent}%（達成）`;
  }else{
    bar.classList.remove("achieved");
    text.textContent = `達成率：${percent}%（あと${remaining}回）`;
  }
}

async function loadData(){
  const tbody = document.querySelector("#resultTable tbody");
  const debug = document.getElementById("debug");
  const errorEl = document.getElementById("error");

  tbody.innerHTML = "";
  debug.textContent = "読み込み中…";
  errorEl.style.display = "none";

  try{
    const res = await fetch(FLOW_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({})
    });

    const result = await safeJson(res);

    let attendance =
      result?.attendance ??
      result?.body?.attendance ??
      result?.value ??
      result?.body?.value ??
      [];

    let thresholdData =
      result?.threshold ??
      result?.body?.threshold ??
      result?.threshold?.value ??
      result?.body?.threshold?.value ??
      [];

    let practiceDates = new Set();
    let players = {};

    const currentMonthKey = getMonthKey();
    let thresholdValue = 0;
    let currentCountValue = 0;

    thresholdData.forEach(item=>{
      const monthKey = toDateKey(item?.Month);
      if(monthKey === currentMonthKey){
        thresholdValue = Number(item?.Threshold ?? 0);
        currentCountValue = Number(item?.Count ?? 0);
      }
    });

    document.getElementById("currentCount").innerText = currentCountValue;

    attendance.forEach(item => {
      const name  = item?.Name ?? item?.["名前"] ?? item?.Title;
      const medal = item?.Medal ?? item?.["Medal"] ?? item?.["メダル"];

      const dateKey = toDateKey(item?.Date ?? item?.["Date"] ?? item?.["日付"]);
      if(dateKey) practiceDates.add(dateKey);

      if(!name || !dateKey) return;

      if(!players[name]){
        players[name] = { dates:new Set(), medals:0 };
      }

      players[name].dates.add(dateKey);

      if(medal && String(medal).includes("🏅")){
        players[name].medals++;
      }
    });

    let final = Object.keys(players).map(name => ({
      name,
      days: players[name].dates.size,
      medals: players[name].medals
    }));

    final.sort((a,b)=>
      Number(b.days)-Number(a.days) ||
      Number(b.medals)-Number(a.medals)
    );

    const completed = practiceDates.size;

    document.getElementById("thresholdCount").innerText = thresholdValue;

    setProgress(completed, thresholdValue);

    if(!attendance.length){
      debug.textContent = "今月はまだ稽古が実施されていません";
      tbody.innerHTML = `
        <tr>
          <td colspan="3">今月のデータはまだありません</td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = "";
    final.forEach(p => {
      tbody.innerHTML += `
        <tr>
          <td>${p.name}</td>
          <td>${p.days}</td>
          <td>${p.medals}</td>
        </tr>`;
    });

    debug.textContent = `取得件数: ${attendance.length} / 集計人数: ${final.length}`;

  }catch(e){
    errorEl.style.display = "block";
    errorEl.textContent = "エラー: " + (e?.message ?? e);
  }
}

loadData();
</script>

</body>
</html>
