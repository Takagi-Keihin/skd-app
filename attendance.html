<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>稽古参加実績</title>

<style>
body{font-family:system-ui;margin:16px}
button{margin:10px 0;padding:8px 16px}
table{border-collapse:collapse;width:100%;margin-top:12px}
th,td{border:1px solid #ddd;padding:8px}
th{background:#f6f6f6;text-align:left}
.error{color:#b00020;white-space:pre-wrap;margin-top:12px}

/* ✅ 追加：スピナー */
.spinner{
  display:none;
  margin:20px auto;
  width:40px;
  height:40px;
  border:4px solid #ddd;
  border-top:4px solid #0078d4;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}

/* ✅ 追加：ロード中の薄表示 */
.loading{
  opacity:0.5;
}
</style>
</head>

<body>

<!-- ✅ スピナー -->
<div id="spinner" class="spinner"></div>

<div id="error" class="error" style="display:none"></div>

<!-- ✅ 上段 -->
<table id="summaryTable">
<thead>
<tr>
<th>最終更新日</th>
<th>累積稽古回数</th>
</tr>
</thead>
<tbody id="summaryBody"></tbody>
</table>

<!-- ✅ 下段 -->
<table id="nameTable">
<thead>
<tr>
<th>名前</th>
<th>これまでの参加回数</th>
</tr>
</thead>
<tbody id="nameBody"></tbody>
</table>

<script>

// ✅ Flow① 上段（Summary）
const SUMMARY_FLOW_URL = "https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/2d5e8b33f7b24ef0ada202adfcf001fb/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=OSi9LYJvPPq8yTqoiHcz4MeT72sPuxui0VM_wkbJb5Q";

// ✅ Flow② 下段（namelist）
const NAMELIST_FLOW_URL = "https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/8212d0d7e9af4be28be925ca027f8973/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=2-rxZ54bDTKYVGrmvFnuWRg1l8zdh8Ov6cTi1P7gkGA";

const errorEl     = document.getElementById("error");
const summaryBody = document.getElementById("summaryBody");
const nameBody    = document.getElementById("nameBody");

/* ✅ 追加 */
const spinner = document.getElementById("spinner");
const summaryTable = document.getElementById("summaryTable");
const nameTable = document.getElementById("nameTable");

const esc = s =>
String(s ?? "").replace(/[&<>\"']/g,c=>({
"&":"&amp;","<":"&lt;",">":"&gt;",
'"':"&quot;","'":"&#39;"
}[c]));

function formatDate(value){

 if(!value) return "";

 if(!isNaN(value)){

   const excelEpoch = new Date(1899,11,30);
   const jsDate = new Date(
     excelEpoch.getTime() + value*86400000
   );

   return jsDate.toLocaleDateString("ja-JP");
 }

 const d=new Date(value);
 return Number.isNaN(d)?value:d.toLocaleDateString("ja-JP");
}

function renderSummary(rows){

summaryBody.innerHTML="";

for(const r of rows){

summaryBody.insertAdjacentHTML("beforeend",`
      <tr>
        <td>${esc(formatDate(r.Date))}</td>
        <td>${esc((r.Count ?? "").toString().trim())}</td>
      </tr>
`);
}
}

function renderNameList(rows){

nameBody.innerHTML="";

for(const r of rows){

nameBody.insertAdjacentHTML("beforeend",`
<tr>
<td>${esc(r.Name ?? "")}</td>
<td>${esc((r.Count ?? "").toString().trim())}</td>
</tr>
`);
}
}

async function fetchAll(){

/* ✅ 追加：ロード開始 */
spinner.style.display = "block";
summaryTable.classList.add("loading");
nameTable.classList.add("loading");

try{

const res1 = await fetch(SUMMARY_FLOW_URL);
let summary = await res1.json();
if(typeof summary==="string") summary=JSON.parse(summary);
renderSummary(summary.body ?? summary.value ?? summary);

const res2 = await fetch(NAMELIST_FLOW_URL);
let namelist = await res2.json();
if(typeof namelist==="string") namelist=JSON.parse(namelist);
renderNameList(
  namelist?.body?.value ??
  namelist?.value ??
  namelist?.body ??
  namelist
);

}catch(e){
errorEl.style.display="block";
errorEl.textContent=e;
}

/* ✅ 追加：ロード終了 */
spinner.style.display = "none";
summaryTable.classList.remove("loading");
nameTable.classList.remove("loading");

}

fetchAll();

</script>

</body>
</html>
