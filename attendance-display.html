<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稽古参加履歴</title>

<style>
body{
 font-family:sans-serif;
 margin:0;
 padding:10px;
 background:#f4f6f9;
}
.container{
 max-width:600px;
 margin:auto;
 background:white;
 padding:15px;
 border-radius:10px;
 box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
h2{text-align:center;}
input,button{
 width:100%;
 padding:12px;
 margin:10px 0;
 font-size:16px;
}
button{
 background:#0078d4;
 color:white;
 border:none;
 border-radius:5px;
}
.deleteBtn{
 background:#d83b01;
}
table{
 width:100%;
 border-collapse:collapse;
 margin-top:15px;
}
th,td{
 border:1px solid #ddd;
 padding:8px;
 text-align:center;
}
th{
 background:#0078d4;
 color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>稽古参加履歴表示</h2>

<input type="date" id="targetDate">

<button onclick="loadHistory()">表示</button>

<div id="result"></div>

</div>

<script>

// =========================
// ★ 履歴取得フローURL
// =========================
const HISTORY_FLOW_URL =
"https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/8c64611d77ed40baa7d2b648f66c7acd/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=E84R2IsN7FgBbmGgGkuQh5yG7AagRfl6bIpVKOuoC3M";


// =========================
// 履歴表示（SharePoint版）
// =========================
async function loadHistory() {

  const selectedDate = document.getElementById("targetDate").value;

  if (!selectedDate) {
    alert("日付を選択してください");
    return;
  }

  try {
    const response = await fetch(HISTORY_FLOW_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ date: selectedDate })
    });

    // 念のため text で受けてから JSON 化（フローが文字列返しのケース対策）
    const text = await response.text();
    let payload;
    try {
      payload = JSON.parse(text);
    } catch (e) {
      console.log("JSON parse failed. raw text=", text);
      throw new Error("フロー応答がJSONではありません");
    }

    console.log("フロー応答 payload:", payload);

    // 配列をどこから取り出すか（よくある包みを全部吸収）
    const rows =
      Array.isArray(payload) ? payload :
      Array.isArray(payload.value) ? payload.value :
      Array.isArray(payload.data) ? payload.data :
      Array.isArray(payload.body) ? payload.body :
      Array.isArray(payload.body?.value) ? payload.body.value :
      [];

    console.log("rows:", rows);

    if (!rows || rows.length === 0) {
      document.getElementById("result").innerHTML = "<p>該当データがありません</p>";
      return;
    }

    // 列の存在を見てヘッダーを動的に（Date/Medalが来ても対応）
    const hasDate  = rows.some(r => r.Date != null || r.date != null);
    const hasMedal = rows.some(r => r.Medal != null || r.medal != null);

    let html = "<table><tr>";
    html += "<th>名前</th><th>回数</th>";
    if (hasDate)  html += "<th>日付</th>";
    if (hasMedal) html += "<th>メダル</th>";
    html += "</tr>";

    rows.forEach(item => {
      const name  = item.Name ?? item.name ?? "";
      const count = item.Count ?? item.count ?? "";
      const date  = item.Date ?? item.date ?? "";
      const medal = item.Medal ?? item.medal ?? "";

      html += "<tr>";
      html += `<td>${name}</td>`;
      html += `<td>${count}</td>`;
      if (hasDate)  html += `<td>${date}</td>`;
      if (hasMedal) html += `<td>${medal}</td>`;
      html += "</tr>";
    });

    html += "</table>";
    document.getElementById("result").innerHTML = html;

  } catch (error) {
    alert("取得エラー");
    console.log(error);
  }
}


 // ✅ ページ表示時に今日の日付を自動入力
window.addEventListener("DOMContentLoaded", () => {

 const today = new Date();

 const yyyy = today.getFullYear();
 const mm = String(today.getMonth()+1).padStart(2,'0');
 const dd = String(today.getDate()).padStart(2,'0');

 document.getElementById("targetDate").value =
 `${yyyy}-${mm}-${dd}`;

 loadHistory()

});

</script>

</body>
</html>
