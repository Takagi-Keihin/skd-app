<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>зЁҪеҸӨеҸӮеҠ еұҘжӯҙ</title>

<style>
body{
 font-family:sans-serif;
 margin:0;
 padding:10px;
 background:#f4f6f9;
}
.container{
 max-width:600px;
 margin:auto;
 background:white;
 padding:15px;
 border-radius:10px;
 box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
h2{text-align:center;}
input,button{
 width:100%;
 padding:12px;
 margin:10px 0;
 font-size:16px;
}
button{
 background:#0078d4;
 color:white;
 border:none;
 border-radius:5px;
}
.deleteBtn{
 background:#d83b01;
}
table{
 width:100%;
 border-collapse:collapse;
 margin-top:15px;
}
th,td{
 border:1px solid #ddd;
 padding:8px;
 text-align:center;
}
th{
 background:#0078d4;
 color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>зЁҪеҸӨеҸӮеҠ еұҘжӯҙиЎЁзӨә</h2>

<input type="date" id="targetDate">

<button onclick="loadHistory()">иЎЁзӨә</button>

<div id="result"></div>

</div>

<script>

// =========================
// вҳ… еұҘжӯҙеҸ–еҫ—гғ•гғӯгғјURL
// =========================
const HISTORY_FLOW_URL =
"https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/8c64611d77ed40baa7d2b648f66c7acd/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=E84R2IsN7FgBbmGgGkuQh5yG7AagRfl6bIpVKOuoC3M";


// =========================
// еұҘжӯҙиЎЁзӨәпјҲExcelзүҲпјү
// =========================
async function loadHistory() {

  const selectedDate = document.getElementById("targetDate").value;

  if (!selectedDate) {
    alert("ж—Ҙд»ҳгӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„");
    return;
  }

  try {
    const response = await fetch(HISTORY_FLOW_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ date: selectedDate })
    });

    // еҝөгҒ®гҒҹгӮҒ text гҒ§еҸ—гҒ‘гҒҰгҒӢгӮү JSON еҢ–пјҲгғ•гғӯгғјгҒҢж–Үеӯ—еҲ—иҝ”гҒ—гҒ®гӮұгғјгӮ№еҜҫзӯ–пјү
    const text = await response.text();
    let payload;
    try {
      payload = JSON.parse(text);
    } catch (e) {
      console.log("JSON parse failed. raw text=", text);
      throw new Error("гғ•гғӯгғјеҝңзӯ”гҒҢJSONгҒ§гҒҜгҒӮгӮҠгҒҫгҒӣгӮ“");
    }

    console.log("гғ•гғӯгғјеҝңзӯ” payload:", payload);

    // й…ҚеҲ—гӮ’гҒ©гҒ“гҒӢгӮүеҸ–гӮҠеҮәгҒҷгҒӢпјҲгӮҲгҒҸгҒӮгӮӢеҢ…гҒҝгӮ’е…ЁйғЁеҗёеҸҺпјү
    const rows =
      Array.isArray(payload) ? payload :
      Array.isArray(payload.value) ? payload.value :
      Array.isArray(payload.data) ? payload.data :
      Array.isArray(payload.body) ? payload.body :
      Array.isArray(payload.body?.value) ? payload.body.value :
      [];

    console.log("rows:", rows);

    if (!rows || rows.length === 0) {
      document.getElementById("result").innerHTML = "<p>и©ІеҪ“гғҮгғјгӮҝгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</p>";
      return;
    }

    let html = "<table>";
html += "<tr><th>еҗҚеүҚ</th></tr>";

rows.forEach(item => {
  const name = item.Name ?? item.name ?? "";
  html += `<tr><td>${name}</td></tr>`;
});

html += "</table>";
    document.getElementById("result").innerHTML = html;

  } catch (error) {
    alert("еҸ–еҫ—гӮЁгғ©гғј");
    console.log(error);
  }
}


 // вң… гғҡгғјгӮёиЎЁзӨәжҷӮгҒ«д»Ҡж—ҘгҒ®ж—Ҙд»ҳгӮ’иҮӘеӢ•е…ҘеҠӣ
window.addEventListener("DOMContentLoaded", () => {

 const today = new Date();

 const yyyy = today.getFullYear();
 const mm = String(today.getMonth()+1).padStart(2,'0');
 const dd = String(today.getDate()).padStart(2,'0');

 document.getElementById("targetDate").value =
 `${yyyy}-${mm}-${dd}`;

 loadHistory()

});

</script>

</body>
</html>
