<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>稽古参加管理</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-size: 16px;
    margin: 10px;
  }
  .row {
    padding: 10px 0;
    border-bottom: 1px solid #eee;
    cursor: pointer;
  }
  .row:active {
    background: #f0f0f0;
  }
  input[type="checkbox"] {
    transform: scale(1.2);
    margin-right: 8px;
  }
  button {
    font-size: 16px;
    padding: 8px 12px;
    margin-top: 10px;
  }
  #nameList {
    max-height: 60vh;
    overflow-y: auto;
  }

  /* ✅ 日付を横並びに */
  .dateRow {
    display: flex;
    align-items: center;
    gap: 10px;
  }
</style>

</head>
<body>

<h2>参加チェック</h2>

<!-- ✅ 1行化 -->
<div class="dateRow">
  <label>日付：</label>
  <input type="date" id="targetDate">
</div>

<!-- ✅ 余白追加（これが改行） -->
<div style="margin-bottom: 10px;"></div>

<form id="attendanceForm">
  <div id="nameList"></div>

  <div id="countAreaBottom" style="margin-top:10px; font-weight:bold;">
    指導者：0名 ／ その他：0名
  </div>

  <div style="display:flex; gap:10px;">
    <button type="button" id="submitBtn" onclick="submitData()" disabled>送信</button>
    <button type="button" onclick="clearAll()">クリア</button>
  </div>
</form>

<script>
function setToday() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = ("0" + (today.getMonth() + 1)).slice(-2);
  const dd = ("0" + today.getDate()).slice(-2);
  document.getElementById("targetDate").value = `${yyyy}-${mm}-${dd}`;
}

function updateCount() {
  const checkboxes = document.querySelectorAll('input[type="checkbox"]');
  let teacherCount = 0;
  let normalCount = 0;

  checkboxes.forEach(cb => {
    if (cb.checked) {
      if (cb.dataset.teacher === "true") {
        teacherCount++;
      } else {
        normalCount++;
      }
    }
  });

  const text = `指導者：${teacherCount}名 ／ その他：${normalCount}名`;
  document.getElementById("countAreaBottom").innerText = text;

  document.getElementById("submitBtn").disabled = (teacherCount + normalCount === 0);
}

function clearAll() {
  document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
  updateCount();
}

async function loadNames() {
  try {
    const res = await fetch("https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a25491149cda4cf9a48cb2434aea5aba/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=HDJuDQfxYJfnj9-OJH6Z1vSGtcL2pBhvL4Sec-C7jS8", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({})
    });

    const result = await res.json();
    const data = result.value || result.body || result;

    const container = document.getElementById("nameList");
    container.innerHTML = "";

    data.forEach((item, index) => {
      const name = item["名前"] || item.Name || item.Title;
      if (!name) return;

      const isTeacher = item["指導者"] == 1 || item["指導者"] == "1";
      const teacherLabel = isTeacher ? "<span style='color:red;'>（指導者）</span>" : "";

      const row = document.createElement("div");
      row.className = "row";

      row.innerHTML = `
        <input type="checkbox" name="att_${index}" data-teacher="${isTeacher}">
        ${name} ${teacherLabel}
      `;

      row.addEventListener("click", function(e) {
        if (e.target.tagName !== "INPUT") {
          const cb = this.querySelector('input[type="checkbox"]');
          cb.checked = !cb.checked;
          updateCount();
        }
      });

      row.querySelector('input').addEventListener("change", updateCount);

      container.appendChild(row);
    });

    window.nameData = data;
    updateCount();

  } catch (e) {
    console.error("名前取得エラー:", e);
    alert("名前一覧の取得に失敗しました");
  }
}

async function submitData() {
  try {
    if (!window.nameData) {
      alert("名前データが読み込まれていません");
      return;
    }

    const date = document.getElementById("targetDate").value;
    if (!date) {
      alert("日付を選択してください");
      return;
    }

    const results = [];
    const selectedNames = [];

    window.nameData.forEach((item, index) => {
      const checkbox = document.querySelector(`input[name="att_${index}"]`);
      if (!checkbox || !checkbox.checked) return;

      const name = item["名前"] || item.Name || item.Title;
      if (!name) return;

      const isTeacher = checkbox.dataset.teacher === "true";

      results.push({
        Name: name,
        Date: date,
        Teacher: isTeacher ? "Yes" : ""
      });

      selectedNames.push(name);
    });

    if (results.length === 0) {
      alert("出席者を選択してください");
      return;
    }

    let teacherCount = 0;
    let normalCount = 0;
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      if (cb.checked) {
        if (cb.dataset.teacher === "true") {
          teacherCount++;
        } else {
          normalCount++;
        }
      }
    });

    const confirmMessage =
      `以下のメンバーを送信します。\n\n${selectedNames.join("\n")}\n\n` +
      `指導者：${teacherCount}名 ／ その他：${normalCount}名\n\nよろしいですか？`;

    if (!confirm(confirmMessage)) {
      return;
    }

    await fetch("https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/f9eb66c492d1476984c818700b4ed111/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=fCOMjmn-aPnmdSpsItaT7_siRj8wWtfc1DGbxYW4Q64", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(results)
    });

    alert("送信完了");

    clearAll();

  } catch (e) {
    console.error("送信エラー:", e);
    alert("送信に失敗しました");
  }
}

setToday();
loadNames();
</script>

</body>
</html>
