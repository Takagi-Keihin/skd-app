<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>稽古参加管理</title>
</head>
<body>

<h2>参加チェック</h2>

<label>日付：</label>
<input type="date" id="targetDate">

<!-- ✅ 追加：人数表示 -->
<div id="countArea" style="margin:10px 0; font-weight:bold;">
  指導者：0名 ／ その他：0名
</div>

<form id="attendanceForm">
  <div id="nameList"></div>
  <button type="button" onclick="submitData()">送信</button>
</form>

<script>
function setToday() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = ("0" + (today.getMonth() + 1)).slice(-2);
  const dd = ("0" + today.getDate()).slice(-2);
  document.getElementById("targetDate").value = `${yyyy}-${mm}-${dd}`;
}

// ✅ 追加：カウント更新関数
function updateCount() {
  const checkboxes = document.querySelectorAll('input[type="checkbox"]');
  let teacherCount = 0;
  let normalCount = 0;

  checkboxes.forEach(cb => {
    if (cb.checked) {
      if (cb.dataset.teacher === "true") {
        teacherCount++;
      } else {
        normalCount++;
      }
    }
  });

  document.getElementById("countArea").innerText =
    `指導者：${teacherCount}名 ／ その他：${normalCount}名`;
}

async function loadNames() {
  try {
    const res = await fetch("https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a25491149cda4cf9a48cb2434aea5aba/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=HDJuDQfxYJfnj9-OJH6Z1vSGtcL2pBhvL4Sec-C7jS8", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({})
    });

    const result = await res.json();
    const data = result.value || result.body || result;

    const container = document.getElementById("nameList");
    container.innerHTML = "";

    data.forEach((item, index) => {
      const name = item["名前"] || item.Name || item.Title;
      if (!name) return;

      const isTeacher = item["指導者"] == 1 || item["指導者"] == "1";
      const teacherLabel = isTeacher ? "<span style='color:red;'>（指導者）</span>" : "";

      const row = `
        <div>
          <label>
            <!-- ✅ 変更：onchange追加 -->
            <input type="checkbox" name="att_${index}" data-teacher="${isTeacher}" onchange="updateCount()">
            ${name} ${teacherLabel}
          </label>
        </div>
      `;
      container.innerHTML += row;
    });

    window.nameData = data;

  } catch (e) {
    console.error("名前取得エラー:", e);
    alert("名前一覧の取得に失敗しました");
  }
}

async function submitData() {
  try {
    if (!window.nameData) {
      alert("名前データが読み込まれていません");
      return;
    }

    const date = document.getElementById("targetDate").value;
    if (!date) {
      alert("日付を選択してください");
      return;
    }

    const results = [];
    const selectedNames = [];

    window.nameData.forEach((item, index) => {
      const checkbox = document.querySelector(`input[name="att_${index}"]`);
      if (!checkbox || !checkbox.checked) return;

      const name = item["名前"] || item.Name || item.Title;
      if (!name) return;

      const isTeacher = checkbox.dataset.teacher === "true";

      results.push({
        Name: name,
        Date: date,
        Teacher: isTeacher ? "Yes" : ""
      });

      selectedNames.push(name);
    });

    if (results.length === 0) {
      alert("出席者を選択してください");
      return;
    }

    // ✅ 変更：人数も確認に表示
    let teacherCount = 0;
    let normalCount = 0;
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      if (cb.checked) {
        if (cb.dataset.teacher === "true") {
          teacherCount++;
        } else {
          normalCount++;
        }
      }
    });

    const confirmMessage =
      `以下のメンバーを送信します。\n\n${selectedNames.join("\n")}\n\n` +
      `指導者：${teacherCount}名 ／ その他：${normalCount}名\n\nよろしいですか？`;

    if (!confirm(confirmMessage)) {
      return;
    }

    await fetch("https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/f9eb66c492d1476984c818700b4ed111/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=fCOMjmn-aPnmdSpsItaT7_siRj8wWtfc1DGbxYW4Q64", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(results)
    });

    alert("送信完了");

    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);

    // ✅ 追加：リセット後もカウント更新
    updateCount();

  } catch (e) {
    console.error("送信エラー:", e);
    alert("送信に失敗しました");
  }
}

setToday();
loadNames();
</script>

</body>
</html>
