<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乱取り入力</title>
<style>
body { font-family: Arial; max-width: 500px; margin: auto; padding: 20px; }
h2 { text-align: center; }
.row { display: flex; gap: 10px; margin-bottom: 10px; }
select, input { flex: 1; padding: 8px; }
button { padding: 10px; margin-top: 10px; width: 100%; }
</style>
</head>
<body>

<h2>乱取り回数入力</h2>

<div id="formArea"></div>

<button onclick="addRow()">＋追加</button>
<button onclick="submitAll()">まとめて送信</button>

<script>
/* =========================
   1. グローバル変数
========================= */
let names = [];

/* =========================
   2. 行追加（← 先に定義）
========================= */
function addRow() {
  const div = document.createElement("div");
  div.className = "row";

  const select = document.createElement("select");
  names.forEach(n => {
    const opt = document.createElement("option");
    opt.value = n;
    opt.text = n;
    select.appendChild(opt);
  });

  const input = document.createElement("input");
  input.type = "number";
  input.placeholder = "回数";
  input.min = 0;

  div.appendChild(select);
  div.appendChild(input);
  document.getElementById("formArea").appendChild(div);
}

/* =========================
   3. 名前取得
========================= */
async function loadNames() {
  try {
    const res = await fetch(NAMES_FLOW_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=UTF-8" },
      body: "{}"
    });

    const raw = await res.text();
    console.log("names raw response:", raw);

    let data = JSON.parse(raw);

    const arr =
      Array.isArray(data) ? data :
      Array.isArray(data.value) ? data.value :
      [];

    if (!arr.length) throw new Error("名前リストが空です");

    // ★ ここで names に代入
    names = arr.map(x =>
      typeof x === "string"
        ? x
        : x.name ?? x.Name ?? x["氏名"] ?? x["名前"]
    ).filter(Boolean);

    if (!names.length) {
      console.log("first element:", arr[0]);
      throw new Error("要素のプロパティ名が想定外です");
    }

    addRow(); // ← ここで初めて呼ぶ

  } catch (e) {
    console.error(e);
    alert(`名前取得エラー：${e.message}`);
    names = ["山田", "佐藤"];
    addRow();
  }
}

/* =========================
   4. 送信処理
========================= */
async function submitAll() {
  // （省略：これは既存でOK）
}

/* =========================
   5. 初期化（最後）
========================= */
loadNames();
</script>

</body>
</html>
