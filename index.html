<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乱取り回数入力</title>
<style>
  body { font-family: Arial; max-width: 500px; margin: auto; padding: 20px; }
  h2 { text-align: center; }
  .row { display: flex; gap: 10px; margin-bottom: 10px; }
  select, input { flex: 1; padding: 8px; }
  button { padding: 10px; margin-top: 10px; width: 100%; }
</style>
</head>

<body>
<h2>乱取り回数入力</h2>

<div id="formArea"></div>

<button onclick="addRow()">＋追加</button>
<button onclick="submitAll()">まとめて送信</button>

<script>
/* =========================
   0. ★ここだけ必ず設定★
========================= */
// Excelから名前一覧を返すフローの HTTP POST URL
const NAMES_FLOW_URL = "https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a25491149cda4cf9a48cb2434aea5aba/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=HDJuDQfxYJfnj9-OJH6Z1vSGtcL2pBhvL4Sec-C7jS8";

// 入力データを登録するフローの HTTP POST URL
const SUBMIT_FLOW_URL = "https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/064833865b844905a35b6c67a423567e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=J5glW6syJVDSL_9RZ4Mf4LXIoqYRP_GOsHCP6Gl1EUw";

/* =========================
   1. 変数
========================= */
let names = [];

/* =========================
   2. 行を追加
========================= */
function addRow() {
  const div = document.createElement("div");
  div.className = "row";

  const select = document.createElement("select");
  names.forEach(n => {
    const opt = document.createElement("option");
    opt.value = n;
    opt.text = n;
    select.appendChild(opt);
  });

  const input = document.createElement("input");
  input.type = "number";
  input.placeholder = "回数";
  input.min = 0;

  div.appendChild(select);
  div.appendChild(input);
  document.getElementById("formArea").appendChild(div);
}

/* =========================
   3. 名前一覧取得
========================= */
async function loadNames() {
  try {
    const res = await fetch(NAMES_FLOW_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=UTF-8" },
      body: "{}"
    });

    const raw = await res.text();
    console.log("names raw response:", raw);

    if (!res.ok) {
      throw new Error(`取得失敗: ${res.status}`);
    }

    const data = JSON.parse(raw);

    // Power Automate の応答でよくある形を全部吸収
    const arr =
      Array.isArray(data) ? data :
      Array.isArray(data.value) ? data.value :
      [];

    if (!arr.length) {
      throw new Error("名前リストが空です");
    }

    // Excel列名をここで拾う
    names = arr
      .map(x =>
        typeof x === "string" ? x :
        x.name ?? x.Name ?? x["氏名"] ?? x["名前"]
      )
      .filter(Boolean);

    if (!names.length) {
      console.log("first element:", arr[0]);
      throw new Error("要素のプロパティ名が想定外です");
    }

    addRow();

  } catch (err) {
    console.error(err);
    alert(`名前取得エラー：${err.message}`);
    names = ["山田", "佐藤"]; // フォールバック
    addRow();
  }
}

/* =========================
   4. まとめて送信
========================= */
async function submitAll() {
  const rows = document.querySelectorAll(".row");
  const data = [];

  rows.forEach(row => {
    const name = row.children[0].value;
    const count = row.children[1].value;
    if (count !== "") data.push({ name, count: Number(count) });
  });

  if (!data.length) {
    alert("入力がありません");
    return;
  }

  if (!confirm(
    "この内容で送信しますか？\n\n" +
    data.map(d => `${d.name}: ${d.count}`).join("\n")
  )) return;

  try {
    const res = await fetch(SUBMIT_FLOW_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    if (!res.ok) throw new Error("送信失敗");

    alert("送信完了！");
    location.reload();

  } catch (err) {
    alert(`送信エラー：${err.message}`);
  }
}

/* =========================
   5. 初期化
========================= */
loadNames();
</script>
</body>
</html>
