<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乱取り回数入力</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 500px;
    margin: auto;
    padding: 20px;
  }
  h2 {
    text-align: center;
  }
  .row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  select, input {
    flex: 1;
    padding: 8px;
  }
  button {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
  }
</style>
</head>

<body>
<h2>乱取り回数入力</h2>

<div id="formArea"></div>

<button onclick="addRow()">＋追加</button>
<button onclick="submitAll()">まとめて送信</button>

<script>
/* =====================================================
   ★ 必須設定：ここだけ自分のURLに変更してください
===================================================== */

// 名前取得フロー（HTTP トリガー）の URL
const NAMES_FLOW_URL  = "https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a25491149cda4cf9a48cb2434aea5aba/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=HDJuDQfxYJfnj9-OJH6Z1vSGtcL2pBhvL4Sec-C7jS8";

// 送信フロー（HTTP トリガー）の URL
const SUBMIT_FLOW_URL = "https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/064833865b844905a35b6c67a423567e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=J5glW6syJVDSL_9RZ4Mf4LXIoqYRP_GOsHCP6Gl1EUw";

/* =====================================================
   変数
===================================================== */
let names = [];

/* =====================================================
   行追加
===================================================== */
function addRow() {
  const div = document.createElement("div");
  div.className = "row";

  const select = document.createElement("select");
  names.forEach(n => {
    const opt = document.createElement("option");
    opt.value = n;
    opt.text  = n;
    select.appendChild(opt);
  });

  const input = document.createElement("input");
  input.type = "number";
  input.placeholder = "回数";
  input.min = 0;

  div.appendChild(select);
  div.appendChild(input);
  document.getElementById("formArea").appendChild(div);
}

/* =====================================================
   名前取得（★ここは絶対に送信処理と混ぜない）
   フローの応答：
   {
     "names": [
       { "名前": "さあや" },
       { "名前": "かほ" }
     ]
   }
===================================================== */
async function loadNames() {
  try {
    const res = await fetch(NAMES_FLOW_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=UTF-8"
      },
      body: "{}"
    });

    const raw = await res.text();
    console.log("names raw response:", raw);

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    const data = JSON.parse(raw);

    // ✅ ルートが配列であることを確認
    if (!Array.isArray(data) || data.length === 0) {
      throw new Error("名前リストが空です");
    }

    // ✅ 「名前」プロパティを取り出す
    names = data
      .map(item => item["名前"])
      .filter(Boolean);

    if (names.length === 0) {
      throw new Error("名前を抽出できません");
    }

    addRow();

  } catch (err) {
    console.error(err);
    alert("名前取得エラー:\n" + err.message);

    // フォールバック（保険）
    names = ["山田", "佐藤"];
    addRow();
  }
}

/* =====================================================
   まとめて送信
   送信する JSON:
   [
     { "name": "さあや", "count": 3 },
     { "name": "かほ",   "count": 2 }
   ]
===================================================== */
async function submitAll() {
  const rows = document.querySelectorAll(".row");
  const payload = [];

  rows.forEach(row => {
    const name  = row.children[0].value;
    const count = row.children[1].value;

    if (count !== "") {
      payload.push({
        name: name,
        count: Number(count)
      });
    }
  });

  if (payload.length === 0) {
    alert("入力がありません");
    return;
  }

  if (!confirm(
    "この内容で送信しますか？\n\n" +
    payload.map(p => `${p.name}: ${p.count}`).join("\n")
  )) return;

  console.log("submit payload:", payload);

  try {
    const res = await fetch(SUBMIT_FLOW_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    console.log("submit response:", res.status, text);

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    alert("送信完了！");
    location.reload();

  } catch (err) {
    console.error(err);
    alert("送信エラー:\n" + err.message);
  }
}

/* =====================================================
   初期化
===================================================== */
loadNames();
</script>

</body>
</html>
