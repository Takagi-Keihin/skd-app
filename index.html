<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乱取り回数入力</title>

<style>
body{font-family:Arial;max-width:560px;margin:auto;padding:16px}
.row{border:2px solid #ddd;border-radius:12px;padding:12px;margin-bottom:12px;background:#fff;transition:.2s}
.row.error{border-color:#e5533d;background:#fff5f4}
.inline{display:grid;grid-template-columns:1fr 110px;gap:10px;margin-top:10px}
@media(max-width:480px){.inline{grid-template-columns:1fr}}
select,input{padding:10px;width:100%;font-size:16px}
.customName{display:none}
.deleteBtn{padding:10px;border-radius:10px}
button{padding:14px;width:100%;margin-top:10px;border-radius:12px;font-size:16px}
</style>
</head>

<body>
<h2>乱取り回数入力</h2>
<div id="formArea"></div>
<button onclick="addRow()">＋追加</button>
<button onclick="submitAll()">まとめて送信</button>

<script>
const NAMES_FLOW_URL="https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a25491149cda4cf9a48cb2434aea5aba/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=HDJuDQfxYJfnj9-OJH6Z1vSGtcL2pBhvL4Sec-C7jS8";
const SUBMIT_FLOW_URL="https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/064833865b844905a35b6c67a423567e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=J5glW6syJVDSL_9RZ4Mf4LXIoqYRP_GOsHCP6Gl1EUw";

let names=[];const OTHER="__OTHER__";

function getName(r){
 const s=r.querySelector(".nameSelect");
 const c=r.querySelector(".customName");
 return s.value===OTHER?(c.value||"").trim():(s.value||"").trim();
}

function refresh(){
 const rows=[...document.querySelectorAll(".row")];
 const used=new Set();
 rows.forEach(r=>{let v=r.querySelector(".nameSelect").value;if(v&&v!==OTHER)used.add(v)});
 rows.forEach(r=>{
  let s=r.querySelector(".nameSelect"),cur=s.value;
  [...s.options].forEach(o=>{
   if(!o.value||o.value===OTHER)return;
   o.disabled=used.has(o.value)&&o.value!==cur;
  })
 });
}

function addRow(){
 const r=document.createElement("div");r.className="row";
 const s=document.createElement("select");s.className="nameSelect";
 s.innerHTML=`<option value="" disabled selected>名前を選択…</option>
 ${names.map(n=>`<option value="${n}">${n}</option>`).join("")}
 <option value="${OTHER}">その他（手入力）</option>`;
 const c=document.createElement("input");c.className="customName";c.placeholder="Excelに無い名前を入力";
 s.onchange=()=>{c.style.display=s.value===OTHER?"block":"none";if(s.value!==OTHER)c.value="";refresh()};
 const inline=document.createElement("div");inline.className="inline";
 const cnt=document.createElement("input");cnt.type="number";cnt.className="countInput";cnt.placeholder="回数";
 const del=document.createElement("button");del.textContent="削除";del.className="deleteBtn";
 del.onclick=()=>{r.remove();refresh()};
 inline.append(cnt,del);r.append(s,c,inline);
 document.getElementById("formArea").appendChild(r);refresh();
}

async function loadNames(){
 const res=await fetch(NAMES_FLOW_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:"{}"});
 names=(await res.json()).map(x=>x["名前"]);addRow();
}

async function submitAll(){
 const rows=[...document.querySelectorAll(".row")];
 let valid=true,payload=[];
 rows.forEach(r=>{
  r.classList.remove("error");
  let name=getName(r),count=r.querySelector(".countInput").value;
  if(!name||count===""){r.classList.add("error");valid=false;}
  else payload.push({name,count:Number(count)});
 });
 if(!valid){alert("未入力の行があります。赤枠を確認してください。");return;}

 let seen=new Set();
 for(const p of payload){if(seen.has(p.name)){alert("同じ名前が重複しています。");return;}seen.add(p.name);}

 const msg="【乱取り回数入力の内容】\n\n"+payload.map(p=>`${p.name}: ${p.count}`).join("\n")+"\n\n送信しますか？";
 if(!confirm(msg))return;

 await fetch(SUBMIT_FLOW_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
 alert("送信完了！");
 location.reload();
}

loadNames();
</script>
</body>
</html>
