<!DOCTYPE html>="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>乱取り回数入力</title>

<style>
body{
  font-family: Arial;
  max-width:560px;
  margin:auto;
  padding:16px;
}
h2{text-align:center;}

.row{
  border:2px solid #ddd;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}
.row.error{
  border-color:#e5533d;
  background:#fff5f4;
}

.inline{
  display:grid;
  grid-template-columns:1fr 110px;
  gap:10px;
  margin-top:10px;
}

select,input{
  padding:10px;
  width:100%;
  font-size:16px;
}

.customName{display:none;}

.actionBtn{
  padding:14px;
  width:100%;
  margin-top:10px;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
}
</style>
</head>

<body>
<h2>乱取り回数入力</h2>

<!-- ✅ 対象日 -->
<div style="margin-bottom:16px;">
<label>対象日</label>
<input type="date" id="targetDate"/>
<div style="font-size:12px;color:#666;">※未選択の場合は当日</div>
</div>

<div id="formArea"></div>

<button class="actionBtn" onclick="addRow()">＋追加</button>
<button id="sendButton" class="actionBtn" onclick="submitAll()">まとめて送信</button>

<script>
const OTHER_VALUE="__OTHER__";

const SUBMIT_FLOW_URL="https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/064833865b844905a35b6c67a423567e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=J5glW6syJVDSL_9RZ4Mf4LXIoqYRP_GOsHCP6Gl1EUw";
const NAMES_FLOW_URL="https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a25491149cda4cf9a48cb2434aea5aba/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=HDJuDQfxYJfnj9-OJH6Z1vSGtcL2pBhvL4Sec-C7jS8";

let names=[];
let pendingPayload=[];

function resetFormArea(){
document.getElementById("formArea").innerHTML="";
}

function getChosenName(row){
const select=row.querySelector(".nameSelect");
const custom=row.querySelector(".customName");
if(select.value===OTHER_VALUE)return custom.value.trim();
return select.value.trim();
}

function refreshNameOptions(){
const rows=[...document.querySelectorAll(".row")];
const selected=new Set();
rows.forEach(r=>{
const s=r.querySelector(".nameSelect");
if(s.value && s.value!==OTHER_VALUE)selected.add(s.value);
});
rows.forEach(r=>{
const s=r.querySelector(".nameSelect");
[...s.options].forEach(o=>{
if(o.value===""||o.value===OTHER_VALUE){o.disabled=false;return;}
o.disabled=selected.has(o.value)&&o.value!==s.value;
});
});
}

function addRow(){
const row=document.createElement("div");
row.className="row";

const select=document.createElement("select");
select.className="nameSelect";

const ph=document.createElement("option");
ph.value="";
ph.text="名前を選択…";
ph.disabled=true;
ph.selected=true;
select.appendChild(ph);

names.forEach(n=>{
const opt=document.createElement("option");
opt.value=n;
opt.text=n;
select.appendChild(opt);
});

const other=document.createElement("option");
other.value=OTHER_VALUE;
other.text="その他（手入力）";
select.appendChild(other);

const custom=document.createElement("input");
custom.className="customName";
custom.placeholder="手入力";

select.onchange=()=>{
custom.style.display=(select.value===OTHER_VALUE)?"block":"none";
refreshNameOptions();
};

const count=document.createElement("input");
count.type="number";
count.className="countInput";
count.placeholder="回数";

const del=document.createElement("button");
del.textContent="削除";
del.onclick=()=>{
row.remove();
refreshNameOptions();
};

const inline=document.createElement("div");
inline.className="inline";
inline.appendChild(count);
inline.appendChild(del);

row.appendChild(select);
row.appendChild(custom);
row.appendChild(inline);

document.getElementById("formArea").appendChild(row);
refreshNameOptions();
}

async function loadNames(){
const res=await fetch(NAMES_FLOW_URL,{method:"POST",body:"{}"});
const data=await res.json();
names=data.map(x=>x.Name||x.名前||x.Title);
resetFormArea();
addRow();
}

function submitAll(){

const date=document.getElementById("targetDate").value
||new Date().toISOString().slice(0,10);

const rows=[...document.querySelectorAll(".row")];
let valid=true;
const payload=[];

rows.forEach(r=>{
const name=getChosenName(r);
const count=r.querySelector(".countInput").value;
if(!name||count===""){
r.classList.add("error");
valid=false;
return;
}
payload.push({
name:name,
count:Number(count),
date:date
});
});

if(!valid)return;

const seen=new Set();
for(const p of payload){
if(seen.has(p.name)){
alert("同じ名前が重複しています");
return;
}
seen.add(p.name);
}

pendingPayload=payload;

const confirmText=
`対象日: ${date}

`+payload.map(p=>`${p.name}:${p.count}`).join("\n");

if(confirm(confirmText))confirmSend();
}

async function confirmSend(){

const btn=document.getElementById("sendButton");
btn.disabled=true;

try{
const res=await fetch(SUBMIT_FLOW_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(pendingPayload)
});
if(!res.ok)throw new Error(await res.text());
alert("送信完了");
location.reload();
}catch(e){
alert(e);
btn.disabled=false;
}
}

function init(){
const today=new Date().toISOString().slice(0,10);
document.getElementById("targetDate").value=today;
loadNames();
}

document.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>
