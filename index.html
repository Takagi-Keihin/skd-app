<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>道場メニュー</title>

<style>
body {
  font-family: sans-serif;
  background-color: #f5f5f5;
  margin: 0;
  padding: 20px;
  text-align: center;
}

h1 {
  margin-bottom: 30px;
}

.container {
  max-width: 400px;
  margin: 0 auto;
}

.button {
  display: block;
  width: 100%;
  padding: 18px;
  margin-bottom: 15px;
  font-size: 18px;
  font-weight: bold;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.button:active {
  transform: scale(0.97);
}

.btn1 { background-color: #007bff; }
.btn2 { background-color: #6c757d; }
.btn3 { background-color: #28a745; }
.btn4 { background-color: #ff9800; }

/* ✅ 横並び用 */
.row {
  display: flex;
  gap: 10px;
}

/* ✅ PC時 */
.row .button {
  width: 50%;
  margin-bottom: 15px;
}

/* ✅ スマホ時は縦並び */
@media (max-width: 600px){
  .row {
    flex-direction: column;
  }
  .row .button {
    width: 100%;
  }
}

.footer {
  margin-top: 30px;
  font-size: 12px;
  color: #777;
}
</style>

</head>
<body>

<h1>道場メニュー</h1>

<div class="container">

  <a class="button btn1" href="https://polite-mud-0e4a7f000.7.azurestaticapps.net/medal-reg.html">
    🥋 乱取りメダル登録
  </a>

  <a class="button btn2" href="https://polite-mud-0e4a7f000.7.azurestaticapps.net/medal-display.html">
    📜 乱取りメダル履歴（表示のみ）
  </a>

  <!-- ✅ 出席入力＋出席確認 横並び -->
  <div class="row">

    <a class="button btn3" href="https://polite-mud-0e4a7f000.7.azurestaticapps.net/attendance-reg.html">
      ✅ 出席入力
    </a>

    <a class="button btn3" href="https://polite-mud-0e4a7f000.7.azurestaticapps.net/attendance-display.html">
      📋 出席確認
    </a>

  </div>

  <a class="button btn4" href="https://polite-mud-0e4a7f000.7.azurestaticapps.net/attendance.html">
    📊 累積稽古回数
  </a>

  <!-- ✅ 追加ボタン（同じ色） -->
  <a class="button btn4" href="#">
    🏆 MVJ受賞履歴
  </a>

  <a class="button btn4" href="https://polite-mud-0e4a7f000.7.azurestaticapps.net/mvj-summary.html">
    ⭐ 今月のMVJ
  </a>

</div>

<div class="footer">
  © 道場システム
</div>

</body>
</html>
