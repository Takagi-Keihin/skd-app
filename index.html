<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乱取り回数入力</title>

<style>
  body { font-family: Arial, sans-serif; max-width: 520px; margin: auto; padding: 20px; }
  h2 { text-align: center; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .nameArea { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr; gap: 8px; }
  select, input { padding: 8px; }
  .inline { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .customName { display: none; }
  .hint { font-size: 12px; color: #666; margin-top: -4px; }
  button { padding: 10px; margin-top: 10px; width: 100%; }
</style>
</head>

<body>
<h2>乱取り回数入力</h2>

<div id="formArea"></div>

<button onclick="addRow()">＋追加</button>
<button onclick="submitAll()">まとめて送信</button>

<script>
/* =====================================================
   ★ 必須設定：ここだけ自分のURLに変更してください
===================================================== */
const NAMES_FLOW_URL  = "ここに【名前取得フロー】のHTTP POST URL";
const SUBMIT_FLOW_URL = "ここに【送信フロー】のHTTP POST URL";

/* =====================================================
   変数
===================================================== */
let names = [];
const OTHER_VALUE = "__OTHER__";

/* =====================================================
   行追加（プルダウン + その他(手入力)）
===================================================== */
function addRow() {
  const row = document.createElement("div");
  row.className = "row";

  const nameArea = document.createElement("div");
  nameArea.className = "nameArea";

  // プルダウン
  const select = document.createElement("select");
  select.className = "nameSelect";

  // 先頭にプレースホルダ
  const placeholder = document.createElement("option");
  placeholder.value = "";
  placeholder.text = "名前を選択…";
  placeholder.disabled = true;
  placeholder.selected = true;
  select.appendChild(placeholder);

  // Excel名簿
  names.forEach(n => {
    const opt = document.createElement("option");
    opt.value = n;
    opt.text  = n;
    select.appendChild(opt);
  });

  // その他（手入力）
  const otherOpt = document.createElement("option");
  otherOpt.value = OTHER_VALUE;
  otherOpt.text  = "その他（手入力）";
  select.appendChild(otherOpt);

  // 手入力欄
  const custom = document.createElement("input");
  custom.type = "text";
  custom.className = "customName";
  custom.placeholder = "Excelに無い名前を入力";

  const hint = document.createElement("div");
  hint.className = "hint";
  hint.textContent = "※「その他（手入力）」を選ぶと入力できます";

  // 回数欄
  const count = document.createElement("input");
  count.type = "number";
  count.className = "countInput";
  count.placeholder = "回数";
  count.min = 0;

  // イベント：その他選択時のみ入力欄を表示
  select.addEventListener("change", () => {
    if (select.value === OTHER_VALUE) {
      custom.style.display = "block";
      custom.focus();
    } else {
      custom.style.display = "none";
      custom.value = "";
    }
  });

  // まとめて配置
  nameArea.appendChild(select);
  nameArea.appendChild(custom);
  nameArea.appendChild(hint);

  row.appendChild(nameArea);
  row.appendChild(count);

  document.getElementById("formArea").appendChild(row);
}

/* =====================================================
   名前取得（フローが [ { "名前": "..."}, ... ] を返す前提）
===================================================== */
async function loadNames() {
  try {
    const res = await fetch(NAMES_FLOW_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=UTF-8" },
      body: "{}"
    });

    const raw = await res.text();
    console.log("names raw response:", raw);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = JSON.parse(raw);

    if (!Array.isArray(data) || data.length === 0) {
      throw new Error("名前リストが空です");
    }

    // { "名前": "..." } から抽出
    names = data.map(x => x["名前"]).filter(Boolean);

    if (names.length === 0) throw new Error("名前を抽出できません");

    addRow(); // 初期1行

  } catch (err) {
    console.error(err);
    alert("名前取得エラー:\n" + err.message + "\n\n仮の名前で続行します。");
    names = ["山田", "佐藤"];
    addRow();
  }
}

/* =====================================================
   まとめて送信（手入力を優先）
   送信形式: [ { name: string, count: number }, ... ]
===================================================== */
async function submitAll() {
  const rows = document.querySelectorAll(".row");
  const payload = [];

  rows.forEach(row => {
    const select = row.querySelector(".nameSelect");
    const custom = row.querySelector(".customName");
    const countEl = row.querySelector(".countInput");

    const count = countEl.value;
    if (count === "") return; // 未入力はスキップ

    // 名前決定：その他なら手入力、そうでなければ select
    let name = "";
    if (select.value === OTHER_VALUE) {
      name = (custom.value || "").trim();
    } else {
      name = (select.value || "").trim();
    }

    // 名前が空ならスキップ（またはエラーにしたいなら throw）
    if (!name) return;

    payload.push({ name, count: Number(count) });
  });

  if (payload.length === 0) {
    alert("入力がありません（名前・回数を確認してください）");
    return;
  }

  if (!confirm("この内容で送信しますか？\n\n" + payload.map(p => `${p.name}: ${p.count}`).join("\n"))) {
    return;
  }

  try {
    const res = await fetch(SUBMIT_FLOW_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    console.log("submit response:", res.status, text);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    alert("送信完了！");
    location.reload();

  } catch (err) {
    console.error(err);
    alert("送信エラー:\n" + err.message);
  }
}

/* =====================================================
   初期化
===================================================== */
loadNames();
</script>

</body>
</html>
