<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乱取り入力</title>
<style>
body { font-family: Arial; max-width: 500px; margin: auto; padding: 20px; }
h2 { text-align: center; }
.row { display: flex; gap: 10px; margin-bottom: 10px; }
select, input { flex: 1; padding: 8px; }
button { padding: 10px; margin-top: 10px; width: 100%; }
</style>
</head>
<body>

<h2>乱取り回数入力</h2>

<div id="formArea"></div>

<button onclick="addRow()">＋追加</button>
<button onclick="submitAll()">まとめて送信</button>

<script>
const NAMES_FLOW_URL  = "https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a25491149cda4cf9a48cb2434aea5aba/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=HDJuDQfxYJfnj9-OJH6Z1vSGtcL2pBhvL4Sec-C7jS8";
const SUBMIT_FLOW_URL = "https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/064833865b844905a35b6c67a423567e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=J5glW6syJVDSL_9RZ4Mf4LXIoqYRP_GOsHCP6Gl1EUw";

let names = [];

async function loadNames() {
  try {
    // まずはプリフライト回避版（原因切り分けに強い）
    const res = await fetch(NAMES_FLOW_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=UTF-8" },
      body: "{}"
    });

    if (!res.ok) {
      const text = await res.text();
      throw new Error(`名前リスト取得失敗: ${res.status} ${res.statusText}\n${text}`);
    }

    const data = await res.json();

    // 文字列配列でもオブジェクト配列でも吸収
    const normalized = Array.isArray(data)
      ? data.map(x => (typeof x === "string" ? x : (x?.name ?? x?.Name))).filter(Boolean)
      : [];

    if (normalized.length === 0) throw new Error("名前リストが空です（応答JSONの形式を確認）");

    names = normalized;
    addRow();
  } catch (err) {
    console.error(err);
    alert(`名前取得エラー:\n${err.message}`);
    names = ["山田", "佐藤"];
    addRow();
  }
}

async function submitAll() {
  const rows = document.querySelectorAll(".row");
  const data = [];

  rows.forEach(row => {
    const name = row.children[0].value;
    const count = row.children[1].value;
    if (count !== "") data.push({ name, count: Number(count) }); // 0も送れる
  });

  if (!data.length) return alert("入力がありません");

  try {
    const res = await fetch(SUBMIT_FLOW_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(await res.text());
    alert("送信完了！");
    location.reload();
  } catch (err) {
    alert(`送信エラー:\n${err.message}`);
  }
}

loadNames();
</script>

</body>
</html>
