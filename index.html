<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乱取り回数入力</title>
<style>
  body { font-family: Arial; max-width: 500px; margin: auto; padding: 20px; }
  h2 { text-align: center; }
  .row { display: flex; gap: 10px; margin-bottom: 10px; }
  select, input { flex: 1; padding: 8px; }
  button { padding: 10px; margin-top: 10px; width: 100%; }
</style>
</head>

<body>
<h2>乱取り回数入力</h2>

<div id="formArea"></div>

<button onclick="addRow()">＋追加</button>
<button onclick="submitAll()">まとめて送信</button>

<script>
const NAMES_FLOW_URL  = "https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a25491149cda4cf9a48cb2434aea5aba/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=HDJuDQfxYJfnj9-OJH6Z1vSGtcL2pBhvL4Sec-C7jS8";
const SUBMIT_FLOW_URL = "https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/064833865b844905a35b6c67a423567e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=J5glW6syJVDSL_9RZ4Mf4LXIoqYRP_GOsHCP6Gl1EUw";

let names = [];

function addRow() {
  const div = document.createElement("div");
  div.className = "row";

  const select = document.createElement("select");
  names.forEach(n => {
    const opt = document.createElement("option");
    opt.value = n;
    opt.text = n;
    select.appendChild(opt);
  });

  const input = document.createElement("input");
  input.type = "number";
  input.placeholder = "回数";
  input.min = 0;

  div.appendChild(select);
  div.appendChild(input);
  document.getElementById("formArea").appendChild(div);
}

async function loadNames() {
  const res = await fetch(NAMES_FLOW_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=UTF-8" },
    body: "{}"
  });
  const raw = await res.text();
  const data = JSON.parse(raw);

  // あなたの現状の応答形式: { names: [ { "名前": "..."}, ... ] }
  names = (data.names || []).map(x => x["名前"]).filter(Boolean);
  addRow();
}

// ★ここが診断ポイント
async function submitAll() {
  // 1) 送信データ作成
  const rows = document.querySelectorAll(".row");
  const payload = [];
  rows.forEach(row => {
    const name = row.children[0].value;
    const count = row.children[1].value;
    if (count !== "") payload.push({ name, count: Number(count) });
  });

  if (!payload.length) return alert("入力がありません");

  // 2) どのURLに何を送るか必ずログ
  console.log("SUBMIT_FLOW_URL:", SUBMIT_FLOW_URL);
  console.log("payload:", payload);

  // 3) クリックで本当にここまで来ているか確認
  alert("送信処理を開始します（Console/Network を開いて確認してください）");

  // 4) まずはプリフライト回避モードで試す（原因切り分け）
  //   - 送信フロー側は JSON を受けたいはずなので、本来は application/json が最終形
  //   - ただし browser の preflight が原因だと POST 自体が飛ばない
  //   - ここで text/plain で POST が飛ぶなら「preflight/CORS周り」が原因の可能性が高い 【1-f239de】
  const USE_PLAINTEXT = false; // ←まず false のまま試し、ダメなら true にして比較

  const headers = USE_PLAINTEXT
    ? { "Content-Type": "text/plain;charset=UTF-8" }
    : { "Content-Type": "application/json" };

  const body = USE_PLAINTEXT
    ? JSON.stringify(payload)             // text/plain で JSON文字列を送る
    : JSON.stringify(payload);            // application/json で JSON を送る

  try {
    const res = await fetch(SUBMIT_FLOW_URL, {
      method: "POST",
      headers,
      body,
      cache: "no-store",
    });

    console.log("submit status:", res.status, res.statusText);

    const text = await res.text().catch(() => "");
    console.log("submit response body:", text);

    if (!res.ok) throw new Error(`HTTP ${res.status}: ${text}`);

    alert("送信完了！");
    location.reload();

  } catch (e) {
    console.error("submit failed:", e);
    alert("送信エラー（Console と Network を確認）:\n" + e.message);
  }
}

loadNames();
</script>
</body>
</html>
