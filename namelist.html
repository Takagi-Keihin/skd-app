<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>会員名簿</title>

<style>
body{font-family:system-ui;margin:16px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ccc;padding:8px}
th{background:#eee}
</style>

</head>
<body>

<h2>会員名簿</h2>
<div id="status"></div>

<table>
<thead>
<tr>
<th>名前</th>
<th>学年</th>
<th>稽古回数</th>
<th>段位</th>
<th>乱取りメダル</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script>

const FLOW_URL = "https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/8212d0d7e9af4be28be925ca027f8973/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=2-rxZ54bDTKYVGrmvFnuWRg1l8zdh8Ov6cTi1P7gkGA";

const tbody = document.getElementById("tbody");
const status = document.getElementById("status");

function esc(s){
return String(s ?? "")
.replace(/[&<>"']/g,c=>({
"&":"&amp;","<":"&lt;",">":"&gt;",
'"':"&quot;","'":"&#39;"
}[c]));
}

function render(data){

tbody.innerHTML="";

data.forEach(item=>{

const row = `
<tr>
<td>${esc(item.Title)}</td>
<td>${esc(item.Grade)}</td>
<td>${esc(item.Count)}</td>
<td>${esc(item.Dan)}</td>
<td>${esc(item.Medal)}</td>
</tr>
`;

tbody.insertAdjacentHTML("beforeend",row);

});

}

async function loadData(){

try{

const res = await fetch(FLOW_URL);

if(!res.ok){
throw new Error("HTTP "+res.status);
}

const data = await res.json();

render(data);

status.innerText =
"最終更新："+new Date().toLocaleString();

}catch(e){
status.innerText="更新失敗";
console.error(e);
}

}

loadData();

// 常時表示（10秒更新）
setInterval(loadData,10000);

</script>

</body>
</html>
