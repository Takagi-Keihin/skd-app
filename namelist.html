<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>会員名簿</title>

<style>
body{font-family:system-ui;margin:16px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ccc;padding:8px}
th{background:#eee}
button{margin:10px 0;padding:8px 16px}
</style>

</head>
<body>

<h2>会員名簿</h2>

<button id="refreshBtn">手動更新</button>

<div id="status"></div>

<table>
<thead>
<tr>
<th>名前</th>
<th>学年</th>
<th>稽古回数</th>
<th>段位</th>
<th>乱取りメダル</th>
<th>成績</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script>

const FLOW_URL = "https://defaultf1d9068e3b94400c90302c92ac8dbc.f6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/2d5e8b33f7b24ef0ada202adfcf001fb/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=OSi9LYJvPPq8yTqoiHcz4MeT72sPuxui0VM_wkbJb5Q";

const tbody = document.getElementById("tbody");
const status = document.getElementById("status");

function esc(s){
return String(s ?? "")
.replace(/[&<>"']/g,c=>({
"&":"&amp;","<":"&lt;",">":"&gt;",
'"':"&quot;","'":"&#39;"
}[c]));
}

function render(data){

tbody.innerHTML="";

data.forEach(item=>{

const row = `
<tr>
<td>${esc(item.Title)}</td>
<td>${esc(item.Grade)}</td>
<td>${esc(item.Count)}</td>
<td>${esc(item.Dan)}</td>
<td>${esc(item.Medal)}</td>
<td>${esc(item.Achievements)}</td>
</tr>
`;

tbody.insertAdjacentHTML("beforeend",row);

});

}

async function loadData(){

try{

status.innerText="更新中...";

const res = await fetch(FLOW_URL);

if(!res.ok){
throw new Error("HTTP "+res.status);
}

const data = await res.json();

render(data);

status.innerText =
"最終更新："+new Date().toLocaleString();

}catch(e){
status.innerText="更新失敗";
console.error(e);
}

}

// 初回読み込み
loadData();

// ✅ 自動更新（1時間 = 3600000ms）
setInterval(loadData,3600000);

// ✅ 手動更新ボタン
document.getElementById("refreshBtn")
.addEventListener("click",loadData);

</script>

</body>
</html>
