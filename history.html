<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>履歴表示</title>

<style>
body{
 font-family:sans-serif;
 margin:0;
 padding:10px;
 background:#f4f6f9;
}

.container{
 max-width:600px;
 margin:auto;
 background:white;
 padding:15px;
 border-radius:10px;
 box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

h2{text-align:center;}

input,button{
 width:100%;
 padding:12px;
 margin:10px 0;
 font-size:16px;
}

button{
 background:#0078d4;
 color:white;
 border:none;
 border-radius:5px;
}

.deleteBtn{
 background:#d83b01;
}

table{
 width:100%;
 border-collapse:collapse;
 margin-top:15px;
}

th,td{
 border:1px solid #ddd;
 padding:8px;
 text-align:center;
}

th{
 background:#0078d4;
 color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>履歴表示</h2>

<input type="date" id="targetDate">

<button onclick="loadHistory()">表示</button>

<button class="deleteBtn" onclick="deleteHistory()">
この日のデータを全削除
</button>

<div id="result"></div>

<button onclick="location.href='index.html'">
入力画面に戻る
</button>

</div>

<script>

// ✅ 参照フローURL
const HISTORY_FLOW_URL =
"https://ここに参照フローURL";

// ✅ 削除フローURL
const DELETE_FLOW_URL =
"https://ここに削除フローURL";


// ==================
// 履歴表示
// ==================
async function loadHistory(){

const date =
document.getElementById("targetDate").value;

if(!date){
 alert("日付を選択してください");
 return;
}

try{

const response = await fetch(HISTORY_FLOW_URL,{
 method:"POST",
 headers:{ "Content-Type":"application/json" },
 body:JSON.stringify({date})
});

const data = await response.json();

console.log(data);

if(!data || data.length === 0){
 document.getElementById("result").innerHTML =
 "<p>該当データがありません</p>";
 return;
}

let html="<table>";
html+="<tr><th>名前</th><th>回数</th><th>メダル</th></tr>";

data.forEach(item=>{
 html+=`
 <tr>
 <td>${item["名前"]}</td>
 <td>${item["回数"]}</td>
 <td>${item["メダル"]}</td>
 </tr>`;
});

html+="</table>";

document.getElementById("result").innerHTML=html;

}catch(error){

alert("取得エラー");
console.log(error);

}

}


// ==================
// 日付全削除
// ==================
async function deleteHistory(){

const date =
document.getElementById("targetDate").value;

if(!date){
 alert("日付を選択してください");
 return;
}

if(!confirm("この日のデータを全削除しますか？")){
 return;
}

try{

await fetch(DELETE_FLOW_URL,{
 method:"POST",
 headers:{ "Content-Type":"application/json" },
 body:JSON.stringify({date})
});

alert("削除しました");

// 再読込
loadHistory();

}catch(error){

alert("削除エラー");
console.log(error);

}

}

</script>

</body>
</html>
